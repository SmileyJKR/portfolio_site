<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Smiley</title>
  <link rel="icon" type="image/jpg" href="assets/images/WinXP.jpg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/xp.css">
</head>

<body>
  <div id="desktop">


    <div class="desktop-icons">

      <div class="d-icon" onclick="openWindow('win-about')">
        <img src="assets/icons/win98_computer.png" alt="About Me" class="icon-img" />
        <span class="icon-label">About Me</span>
      </div>

      <div class="d-icon" onclick="openWindow('win-files')">
        <img src="assets/icons/win98_folder.png" alt="Files" class="icon-img" />
        <span class="icon-label">Files</span>
      </div>

      <div class="d-icon" onclick="openWindow('win-projects')">
        <img src="assets/icons/win98_program_group.png" alt="Projects" class="icon-img" />
        <span class="icon-label">Projects</span>
      </div>

      <div class="d-icon" onclick="openWindow('win-contact')">
        <img src="assets/icons/win98_telephone.png" alt="Contact" class="icon-img" />
        <span class="icon-label">Contact</span>
      </div>

      <div class="d-icon" onclick="openWindow('win-resume')">
        <img src="assets/icons/win98_note.png" alt="Resume" class="icon-img" />
        <span class="icon-label">Resume</span>
      </div>

      <div class="d-icon" onclick="openWindow('win-blog')">
        <img src="assets/icons/win98_garf.png" alt="Blog" class="icon-img" />
        <span class="icon-label">Blog</span>
      </div>

      


    </div>

    <div class="window" id="win-about" style="width: 310px; position: absolute; display:none; z-index: 10;">
      <div class="title-bar">
        <div class="title-bar-text">About Me</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close" onclick="closeWindow('win-about')"></button>
        </div>
      </div>
      <div class="window-body">
        <h4>
          Hello World!
        </h4>
        <h5>
          ハローワールド！
        </h5>
        <p>
          I'm a CS grad into AI/ML, back-end, drawing, video games, anime, manga, and anything
          introverted （・ω・）b
        </p>
      </div>

    </div>

  </div>
  <div id="taskbar">
    <button class="start-button" onclick="toggleStartMenu(event)" aria-label="Start Menu"></button>


  </div>
  <script src="script.js"></script>
</body>

</html>
